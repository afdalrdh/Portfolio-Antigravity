[build]
builder = "NIXPACKS"

[build.nixpacks]
pkgs = ["nodejs_22"]

[deploy]
startCommand = "cd apps/api && node --import tsx src/db/migrate-v2.ts && node --import tsx src/index.ts"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
